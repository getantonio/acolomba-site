<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Antonio Colomba | Portfolio</title>
  <style>
    :root {
      --paper: #d1d1d1;
      --ink: #202833;
      --muted: #202833;
      --rule: rgba(32, 40, 51, 0.34);
      --soft: rgba(32, 40, 51, 0.08);
      --panel: #c7c7c7;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper);
      color-scheme: only light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      line-height: 1.55;
    }

    body.viewer-open {
      overflow: hidden;
    }

    main {
      width: min(100% - 44px, 980px);
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--rule);
      color: var(--muted);
      font-size: 15px;
    }

    .brand {
      color: var(--ink);
      text-transform: uppercase;
      font-weight: 600;
    }

    a {
      color: inherit;
      text-decoration-thickness: 0.06em;
      text-underline-offset: 3px;
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 18px;
      margin-top: 34px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
    }

    .portfolio-card {
      display: block;
      width: 100%;
      padding: 0;
      border: 1px solid var(--rule);
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .portfolio-card:hover .card-title,
    .portfolio-card:focus-visible .card-title {
      text-decoration: underline;
    }

    .portfolio-card:focus-visible,
    .viewer-close:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 4px;
    }

    .card-frame {
      display: grid;
      aspect-ratio: 1.36 / 1;
      padding: 16px;
      border-bottom: 1px solid var(--rule);
      background: var(--soft);
      overflow: hidden;
    }

    .card-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card-page-thumb {
      object-fit: cover;
      object-position: top center;
    }

    .card-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card-audio,
    .card-plain {
      place-items: center;
    }

    .audio-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: min(100%, 160px);
      height: 92px;
    }

    .audio-mark span {
      display: block;
      width: 9px;
      background: var(--ink);
    }

    .audio-mark span:nth-child(1),
    .audio-mark span:nth-child(7) {
      height: 28px;
    }

    .audio-mark span:nth-child(2),
    .audio-mark span:nth-child(6) {
      height: 54px;
    }

    .audio-mark span:nth-child(3),
    .audio-mark span:nth-child(5) {
      height: 78px;
    }

    .audio-mark span:nth-child(4) {
      height: 92px;
    }

    .card-plain {
      background:
        linear-gradient(135deg, transparent 0 47%, rgba(32, 40, 51, 0.12) 47% 53%, transparent 53% 100%),
        var(--soft);
    }

    .card-plain span {
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
    }

    .card-meta {
      padding: 11px 12px 12px;
      text-align: center;
    }

    .card-title {
      display: block;
      color: var(--ink);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
    }

    .card-type {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(32, 40, 51, 0.72);
    }

    .viewer[aria-hidden="false"] {
      display: grid;
    }

    .viewer-panel {
      width: min(100%, 980px);
      max-height: min(86vh, 780px);
      overflow: auto;
      border: 1px solid rgba(32, 40, 51, 0.5);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(12, 15, 19, 0.32);
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--rule);
    }

    .viewer-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .viewer-close {
      width: 34px;
      height: 34px;
      border: 1px solid var(--rule);
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .viewer-body {
      padding: 16px;
    }

    .viewer-body img,
    .viewer-body video {
      display: block;
      width: 100%;
      max-height: 64vh;
      object-fit: contain;
      background: var(--soft);
    }

    .viewer-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .viewer-compare figure {
      margin: 0;
    }

    .viewer-compare figcaption {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .viewer-audio {
      display: grid;
      gap: 16px;
      justify-items: center;
      padding: 30px 0;
    }

    .viewer-audio img {
      width: min(260px, 62vw);
      background: transparent;
    }

    .viewer-audio audio {
      width: min(100%, 620px);
    }

    .viewer-action {
      display: none;
      margin: 14px 16px 16px;
      font-size: 15px;
      font-weight: 700;
    }

    .viewer-action.is-visible {
      display: inline-block;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 30px, 980px);
      }

      nav {
        flex-direction: column;
      }

      .viewer {
        padding: 14px;
      }

      .viewer-compare {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <nav>
      <a class="brand" href="index.html">Antonio Colomba</a>
      <span><a href="index.html">Home</a> | <a href="resume.html">Resume</a> | <a href="antonio-bio.html">Bio</a> | <a href="projects.html">Projects</a> | <a href="message.html">Contact</a></span>
    </nav>

    <section class="portfolio-grid" aria-label="Portfolio samples">
      <button
        class="portfolio-card"
        type="button"
        data-viewer-type="compare"
        data-title="Retouching"
        data-before="projects/before-after-retouching/images/image-01-before.webp"
        data-after="projects/before-after-retouching/images/image-01-after.webp"
        data-action-label="Open full gallery"
        data-action-href="projects/before-after-retouching/index.html"
      >
        <span class="card-frame">
          <img class="card-page-thumb" src="assets/portfolio/before-after-page-thumb.jpg" alt="">
        </span>
        <span class="card-meta">
          <span class="card-title">Retouching</span>
          <span class="card-type">Before / After</span>
        </span>
      </button>

      <button
        class="portfolio-card"
        type="button"
        data-viewer-type="video"
        data-title="AI Video"
        data-src="projects/before-after-retouching/video/image-04-ai-kling-720p.mp4"
        data-poster="projects/before-after-retouching/images/image-04-after-thumb.webp"
      >
        <span class="card-frame">
          <img src="projects/before-after-retouching/images/image-04-after-thumb.webp" alt="">
        </span>
        <span class="card-meta">
          <span class="card-title">AI Video</span>
          <span class="card-type">Motion</span>
        </span>
      </button>

      <button
        class="portfolio-card"
        type="button"
        data-viewer-type="audio"
        data-title="Sound-a-tude"
        data-src="projects/soundatude/assets/audio/attitude-effort-sample.mp3"
        data-action-label="Open Sound-a-tude"
        data-action-href="projects/soundatude/index.html"
      >
        <span class="card-frame card-audio">
          <span class="audio-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </span>
        </span>
        <span class="card-meta">
          <span class="card-title">Sound-a-tude</span>
          <span class="card-type">Audio</span>
        </span>
      </button>

      <button
        class="portfolio-card"
        type="button"
        data-viewer-type="link"
        data-title="Token / Web3"
        data-action-label="Open project"
        data-action-href="https://tokenfactory-ruby.vercel.app/"
      >
        <span class="card-frame card-plain">
          <span>TF</span>
        </span>
        <span class="card-meta">
          <span class="card-title">Token / Web3</span>
          <span class="card-type">Project</span>
        </span>
      </button>

      <button
        class="portfolio-card"
        type="button"
        data-viewer-type="link"
        data-title="Upcoming"
        data-action-label="Back to projects"
        data-action-href="projects.html"
      >
        <span class="card-frame card-plain">
          <span>+</span>
        </span>
        <span class="card-meta">
          <span class="card-title">Upcoming</span>
          <span class="card-type">Samples</span>
        </span>
      </button>
    </section>
  </main>

  <div class="viewer" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="viewer-title" data-viewer>
    <div class="viewer-panel">
      <div class="viewer-head">
        <h2 class="viewer-title" id="viewer-title" data-viewer-title></h2>
        <button class="viewer-close" type="button" aria-label="Close" data-viewer-close>&times;</button>
      </div>
      <div class="viewer-body" data-viewer-body></div>
      <a class="viewer-action" href="#" data-viewer-action></a>
    </div>
  </div>

  <script>
    (() => {
      const viewer = document.querySelector("[data-viewer]");
      const title = document.querySelector("[data-viewer-title]");
      const body = document.querySelector("[data-viewer-body]");
      const action = document.querySelector("[data-viewer-action]");
      const closeButton = document.querySelector("[data-viewer-close]");
      const cards = document.querySelectorAll("[data-viewer-type]");
      let activeCard = null;

      if (!viewer || !title || !body || !action || !closeButton) {
        return;
      }

      const clearViewer = () => {
        body.querySelectorAll("video, audio").forEach((media) => media.pause());
        body.textContent = "";
        action.classList.remove("is-visible");
        action.removeAttribute("href");
        action.textContent = "";
      };

      const setAction = (card) => {
        const label = card.dataset.actionLabel;
        const href = card.dataset.actionHref;

        if (!label || !href) {
          return;
        }

        action.href = href;
        action.textContent = label;
        action.classList.add("is-visible");
      };

      const makeImage = (src, alt) => {
        const image = document.createElement("img");
        image.src = src;
        image.alt = alt;
        return image;
      };

      const renderCompare = (card) => {
        const wrap = document.createElement("div");
        wrap.className = "viewer-compare";

        [
          ["Before", card.dataset.before],
          ["After", card.dataset.after],
        ].forEach(([label, src]) => {
          const figure = document.createElement("figure");
          const caption = document.createElement("figcaption");
          caption.textContent = label;
          figure.append(makeImage(src, label), caption);
          wrap.append(figure);
        });

        body.append(wrap);
      };

      const renderVideo = (card) => {
        const video = document.createElement("video");
        video.controls = true;
        video.playsInline = true;
        video.poster = card.dataset.poster || "";

        const source = document.createElement("source");
        source.src = card.dataset.src;
        source.type = "video/mp4";
        video.append(source);
        body.append(video);
      };

      const renderAudio = (card) => {
        const wrap = document.createElement("div");
        wrap.className = "viewer-audio";

        if (card.dataset.image) {
          wrap.append(makeImage(card.dataset.image, ""));
        }

        const audio = document.createElement("audio");
        audio.controls = true;
        audio.src = card.dataset.src;
        wrap.append(audio);
        body.append(wrap);
      };

      const renderLink = (card) => {
        const plain = document.createElement("div");
        plain.className = "card-frame card-plain";
        const marker = document.createElement("span");
        const sourceMarker = card.querySelector(".card-plain span");
        marker.textContent = sourceMarker ? sourceMarker.textContent : "+";
        plain.append(marker);
        body.append(plain);
      };

      const openViewer = (card) => {
        activeCard = card;
        clearViewer();
        title.textContent = card.dataset.title || "Portfolio";

        if (card.dataset.viewerType === "compare") {
          renderCompare(card);
        }

        if (card.dataset.viewerType === "video") {
          renderVideo(card);
        }

        if (card.dataset.viewerType === "audio") {
          renderAudio(card);
        }

        if (card.dataset.viewerType === "link") {
          renderLink(card);
        }

        setAction(card);
        viewer.setAttribute("aria-hidden", "false");
        document.body.classList.add("viewer-open");
        closeButton.focus();
      };

      const closeViewer = () => {
        clearViewer();
        viewer.setAttribute("aria-hidden", "true");
        document.body.classList.remove("viewer-open");

        if (activeCard) {
          activeCard.focus();
          activeCard = null;
        }
      };

      cards.forEach((card) => {
        card.addEventListener("click", () => openViewer(card));
      });

      closeButton.addEventListener("click", closeViewer);

      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) {
          closeViewer();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && viewer.getAttribute("aria-hidden") === "false") {
          closeViewer();
        }
      });
    })();
  </script>
</body>
</html>
